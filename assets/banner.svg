<svg viewBox="0 0 880 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="llm-research-inspirations: their paper flows to our note flows to our work, receipts attached, never backwards">
  <defs>
    <linearGradient id="ramp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#9b8cf7"/>
      <stop offset="100%" stop-color="#ef6fd0"/>
    </linearGradient>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="30" font-weight="700" fill="url(#ramp)">llm-research-inspirations</text>
  <text x="440" y="74" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="12.5" font-style="italic" fill="#8b949e">the map from the research we admire to the things we built because of it</text>

  <!-- their paper -->
  <rect x="90" y="100" width="180" height="54" rx="12" fill="#58a6ff" fill-opacity="0.07" stroke="#58a6ff"/>
  <text x="180" y="123" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="15" font-weight="600" fill="#58a6ff">their paper</text>
  <text x="180" y="142" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="10" fill="#8b949e">canonical &#183; always wins</text>

  <!-- our note -->
  <rect x="350" y="100" width="180" height="54" rx="12" fill="#9b8cf7" fill-opacity="0.07" stroke="#9b8cf7"/>
  <text x="440" y="123" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="15" font-weight="600" fill="#9b8cf7">our note</text>
  <text x="440" y="142" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="10" fill="#8b949e">five tiers &#183; locators on everything</text>

  <!-- our work -->
  <rect x="610" y="100" width="180" height="54" rx="12" fill="#ef6fd0" fill-opacity="0.07" stroke="#ef6fd0"/>
  <text x="700" y="123" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="15" font-weight="600" fill="#ef6fd0">our work</text>
  <text x="700" y="142" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="10" fill="#8b949e">receipts attached</text>

  <!-- flowing connectors -->
  <g stroke="#8b949e" stroke-width="2" stroke-dasharray="6 6" fill="none">
    <line x1="276" y1="127" x2="336" y2="127">
      <animate attributeName="stroke-dashoffset" from="12" to="0" dur="1.2s" repeatCount="indefinite"/>
    </line>
    <line x1="536" y1="127" x2="596" y2="127">
      <animate attributeName="stroke-dashoffset" from="12" to="0" dur="1.2s" repeatCount="indefinite"/>
    </line>
  </g>
  <g fill="#8b949e">
    <polygon points="336,121 346,127 336,133"/>
    <polygon points="596,121 606,127 596,133"/>
  </g>

  <text x="440" y="190" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace" font-size="11" fill="#8b949e">authority runs one way &#8212; never backwards (we checked; it&#8217;s in the rules)</text>
</svg>
